<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>	
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أبطال الهندسة | تقييم تفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1976d2; --green: #2e7d32; --dark: #1c2833; --red: #d32f2f; --yellow: #f39c12; --light-blue: #e3f2fd; }
        body { font-family: 'Cairo', sans-serif; background: #f0f4f7; padding: 10px; display: flex; justify-content: center; margin: 0; overflow-x: hidden; }
        .app-card { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; z-index: 10; overflow: hidden; backdrop-filter: blur(5px); }
        p { font-size: 16px; font-weight: 800; line-height: 1.5; margin: 8px 0; color: var(--dark); }
        .math-wrapper { direction: ltr !important; display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-size: 17px; color: var(--blue);}
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .choice-grid-full { grid-template-columns: 1fr !important; }
        .choice-btn { background: white; border: 3px solid var(--blue); padding: 10px 4px; border-radius: 8px; font-family: 'Cairo'; font-weight: 900; font-size: 14px; cursor: pointer; color: var(--dark); transition: 0.2s; direction: rtl; unicode-bidi: isolate; }
        .choice-btn:disabled { opacity: 0.8; cursor: not-allowed; }
        .correct-answer { background: var(--green) !important; border-color: #1b5e20 !important; color: white !important; transform: scale(1.02); animation: pop 0.3s; }
        .wrong-click { background: #ffebee !important; border-color: var(--red) !important; color: var(--red) !important; }
        #toast { visibility: hidden; min-width: 200px; background: var(--red); color: white; text-align: center; border-radius: 10px; padding: 10px; position: fixed; z-index: 1000; left: 50%; bottom: 20px; transform: translateX(-50%); font-weight: bold; font-family: 'Cairo'; }
        #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 2.5s; }
        .question-box { display: none; }
        .active { display: block; }
        .opt-btn { padding: 10px 2px; border: 1.5px solid #ccc; border-radius: 8px; background: white; font-weight: 800; cursor: pointer; font-size: 14px; transition: 0.2s;}
        .header { text-align: center; border-bottom: 3px dashed var(--blue); margin-bottom: 12px; padding-bottom: 10px; }
        .progress-container { width: 100%; background-color: #bbdefb; border-radius: 10px; height: 14px; margin: 15px 0 5px 0; position: relative; }
        .progress-bar { height: 100%; background-color: var(--green); border-radius: 10px; width: 0%; transition: width 0.6s; }
        .bg-bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        .bubble { position: absolute; bottom: -50px; opacity: 0.15; font-size: 24px; animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0); } 100% { transform: translateY(-120vh); } }
        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1.02);} }
    </style>
</head>
<body>
<div class="bg-bubbles" id="bgBubbles"></div>
<div class="app-card">
    <div class="header" id="mainHeader">
        <h1 style="color:var(--blue); margin:0; font-size: 24px;">🏆 تحدي الهندسة 🏆</h1>
        <h3 style="color:var(--red); margin:5px 0 10px 0;">✨ الصف الخامس - المضلعات والزوايا ✨</h3>
        <div style="display: flex; justify-content: space-between; padding: 8px; background: var(--light-blue); border-radius: 10px;">
            <span style="font-weight:900;">السؤال: <span id="qNum">1</span>/<span id="totalQ">20</span></span>
            <span style="font-weight:900;">الدرجة: <span id="liveScore">100</span> ❤️</span>
        </div>
        <div class="progress-container" id="progContainer" style="display: none;">
            <div class="progress-bar" id="pBar"></div>
        </div>
    </div>
    <div id="toast"></div>
    <div id="quiz-container">
        </div>
    <div id="name-input-container" style="display:none; text-align:center; padding: 20px 0;">
        <h2>كفو! يا بطل 👏</h2>
        <input type="text" id="studentName" placeholder="اكتب اسمك هنا..." style="padding: 12px; width: 80%; border-radius: 10px; border: 2px solid var(--blue); margin-bottom: 15px; font-family: 'Cairo'; text-align: center;">
        <button class="opt-btn" style="background:var(--green); color:white; width:80%; padding:15px;" onclick="generateCertificate()">إصدار الشهادة 🎓</button>
    </div>
    <div id="final" style="display:none; text-align:center;">
        <div style="border: 5px double var(--yellow); padding: 20px; border-radius: 15px; background: #fffcf2;">
            <h1 style="color: var(--blue);">🏆 شهادة تقدير 🏆</h1>
            <h2 id="certName" style="color: var(--red);"></h2>
            <div id="finalScore" style="font-size:50px; font-weight:900; color:var(--green);"></div>
            <p>أنجزت المهمة في: <span id="timeTakenText"></span></p>
        </div>
        <button class="opt-btn" style="background:var(--blue); color:white; margin-top:15px; padding:10px 20px;" onclick="window.print()">🖨️ طباعة</button>
    </div>
</div>

<script>
    // بيانات الأسئلة من ملفك الأصلي
    const questionsData = [
        { q: "الشكل المضلع الذي يتكون من 3 أضلاع؟", options: ["المثلث", "المربع", "الخماسي", "السداسي"], correct: 0 },
        { q: "الشكل المضلع الذي يتكون من 5 أضلاع يسمى:", options: ["شكل رباعي", "شكل خماسي", "شكل سداسي", "مثلث"], correct: 1 },
        { q: "الزاوية التي قياسها أقل من 90 درجة تسمى:", options: ["زاوية قائمة", "زاوية منفرجة", "زاوية حادة", "زاوية مستقيمة"], correct: 2 },
        { q: "الزاوية التي قياسها يساوي 90 درجة تسمى:", options: ["زاوية قائمة", "زاوية حادة", "زاوية منفرجة", "زاوية مستقيمة"], correct: 0 },
        { q: "الزاوية التي قياسها أكبر من 90 وأقل من 180 تسمى:", options: ["زاوية قائمة", "زاوية منفرجة", "زاوية مستقيمة", "زاوية حادة"], correct: 1 },
        { q: "ما هو الخط الذي له نقطة بداية ونقطة نهاية محددتين؟", options: ["الخط المستقيم", "القطعة المستقيمة", "الشعاع"], correct: 1 },
        { q: "له بداية وممتد بلا نهاية من جهة واحدة:", options: ["الشعاع", "القطعة المستقيمة", "الخط المستقيم"], correct: 0 },
        { q: "أضلاعي الأربعة متساوية، وزواياي كلها قوائم:", options: ["المربع", "المعين", "المستطيل", "شبه المنحرف"], correct: 0 },
        { q: "كل ضلعين متقابلين متساويان، وزواياي الأربع قوائم:", options: ["المربع", "المستطيل", "متوازي الأضلاع", "المعين"], correct: 1 },
        { q: "أضلاعي متساوية، لكن زواياي ليست قوائم:", options: ["المعين", "متوازي الأضلاع", "المربع"], correct: 0 },
        { q: "كل ضلعين متقابلين متوازيان ومتساويان، وليس لدي زوايا قائمة:", options: ["المستطيل", "متوازي الأضلاع", "شبه المنحرف"], correct: 1 },
        { q: "الشكل الرباعي الذي فيه ضلعان فقط متوازيان؟", options: ["شبه المنحرف", "الطائرة الورقية", "المعين"], correct: 0 },
        { q: "شكل فيه زوجان من الأضلاع المتجاورة متطابقة، وله محور تماثل واحد:", options: ["شبه المنحرف", "الطائرة الورقية", "المعين"], correct: 1 },
        { q: "مستقيمان لا يتقاطعان أبداً مهما امتدا:", options: ["متقاطعان", "متعامدان", "متوازيان"], correct: 2 },
        { q: "الزاوية التي قياسها 180 درجة تسمى:", options: ["حادة", "قائمة", "مستقيمة", "منفرجة"], correct: 2 },
        { q: "مستقيمان يتقاطعان ويصنعان زوايا حادة ومنفرجة:", options: ["متعامدان", "متقاطعان", "متوازيان"], correct: 1 },
        { q: "المثلث الذي يحتوي على زاوية واحدة منفرجة يسمى:", options: ["حاد الزوايا", "قائم الزاوية", "منفرج الزاوية"], correct: 2 },
        { q: "المستقيمان المتعامدان يصنعان 4 زوايا قياسها:", options: ["45", "90", "180", "120"], correct: 1 },
        { q: "المثلث الذي يحتوي على زاوية قياسها 90 درجة يسمى:", options: ["حاد الزوايا", "قائم الزاوية", "منفرج الزاوية"], correct: 1 },
        { q: "الشكل المضلع الذي يتكون من 6 أضلاع يسمى:", options: ["الخماسي", "السداسي", "السباعي", "الثماني"], correct: 1 }
    ];

    let mistakes = 0, totalScore = 100, currentQ = 1, isProcessing = false, startTime, audioCtx;
    const totalQ = questionsData.length;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playTone(f, d) { if (!audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

    function startQuiz(btn) {
        initAudio(); startTime = new Date();
        document.getElementById('intro-box').classList.remove('active');
        renderQuestion(0);
        document.getElementById('progContainer').style.display = 'block';
    }

    function renderQuestion(index) {
        const data = questionsData[index];
        let html = `<div class="question-box active" id="q${index+1}"><p>${data.q}</p><div class="choice-grid${data.options.length < 3 ? '-full' : ''}">`;
        data.options.forEach((opt, i) => {
            html += `<button class="choice-btn" onclick="checkAnswer(this, ${i === data.correct}, ${index})">${opt}</button>`;
        });
        html += `</div></div>`;
        document.getElementById('quiz-container').innerHTML = html;
        document.getElementById('qNum').innerText = index + 1;
        document.getElementById('pBar').style.width = (index / totalQ) * 100 + '%';
    }

    function checkAnswer(btn, isCorrect, index) {
        if (isProcessing) return; isProcessing = true;
        const btns = btn.parentElement.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        if (isCorrect) {
            playTone(600, 0.3); btn.classList.add('correct-answer');
            setTimeout(() => { if (index + 1 < totalQ) { renderQuestion(index + 1); currentQ++; isProcessing = false; } else { finishQuiz(); } }, 800);
        } else {
            playTone(200, 0.3); btn.classList.add('wrong-click'); totalScore -= 5;
            document.getElementById('liveScore').innerText = Math.max(0, totalScore);
            btns[questionsData[index].correct].classList.add('correct-answer');
            setTimeout(() => { if (index + 1 < totalQ) { renderQuestion(index + 1); currentQ++; isProcessing = false; } else { finishQuiz(); } }, 1500);
        }
    }

    function finishQuiz() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('mainHeader').style.display = 'none';
        document.getElementById('name-input-container').style.display = 'block';
    }

    function generateCertificate() {
        const name = document.getElementById('studentName').value;
        if (!name) return;
        document.getElementById('name-input-container').style.display = 'none';
        document.getElementById('certName').innerText = name;
        document.getElementById('finalScore').innerText = Math.max(0, totalScore) + "%";
        document.getElementById('timeTakenText').innerText = Math.floor((new Date() - startTime)/1000) + " ثانية";
        document.getElementById('final').style.display = 'block';
    }

    window.onload = createBackgroundBubbles;
    function createBackgroundBubbles() {
        const bg = document.getElementById('bgBubbles');
        for(let i=0; i<10; i++) {
            let b = document.createElement('div'); b.className = 'bubble'; b.innerText = '📐';
            b.style.left = Math.random() * 100 + 'vw'; b.style.animationDuration = (Math.random() * 8 + 5) + 's';
            bg.appendChild(b);
        }
    }
</script>
</body>
</html>
